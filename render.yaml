services:
  - type: web
    name: cctv-prakasam-portal
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && cd web && npm install && npm run build && cd .. && npm run build
    startCommand: node dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_VERSION
        value: "1.0"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_CHANNEL_ID
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
